name: Build & Deploy Nexteam

on:
  push:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: wikiarlnm/fornexteam-frontend-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: wikiarlnm/fornexteam-backend-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: BACKEND_ENV
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin:/usr/bin

            echo "==> Creating Docker network..."
            docker network create nexteam 2>/dev/null || true

            echo "==> Writing backend .env..."
            mkdir -p /opt/nexteam/backend/storage /opt/nexteam/backend/database
            printenv BACKEND_ENV > /opt/nexteam/backend/.env

            echo "==> Deploying frontend..."
            docker stop fornexteam-frontend 2>/dev/null || true
            docker rm fornexteam-frontend 2>/dev/null || true
            docker rmi wikiarlnm/fornexteam-frontend-app:latest 2>/dev/null || true
            docker pull wikiarlnm/fornexteam-frontend-app:latest
            docker run -d \
              --name fornexteam-frontend \
              --network nexteam \
              --restart unless-stopped \
              -p 7001:80 \
              wikiarlnm/fornexteam-frontend-app:latest

            echo "==> Deploying backend..."
            docker stop fornexteam-backend 2>/dev/null || true
            docker rm fornexteam-backend 2>/dev/null || true
            docker rmi wikiarlnm/fornexteam-backend-app:latest 2>/dev/null || true
            docker pull wikiarlnm/fornexteam-backend-app:latest
            docker run -d \
              --name fornexteam-backend \
              --network nexteam \
              --restart unless-stopped \
              -p 7002:80 \
              --env-file /opt/nexteam/backend/.env \
              -v /opt/nexteam/backend/storage:/var/www/html/storage/app \
              -v /opt/nexteam/backend/database:/var/www/html/database \
              wikiarlnm/fornexteam-backend-app:latest

            echo "==> Clearing dangling Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
